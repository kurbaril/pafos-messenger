services:
  # Backend API + WebSocket
  - type: web
    name: pafos-backend
    runtime: node
    plan: free
    buildCommand: cd packages/backend && npm install && npx prisma generate
    startCommand: cd packages/backend && node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pafos-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET_TOKEN
        generateValue: true
      - key: ADMIN_SECRET_URL
        value: /admin/super-secret-pafos-2024
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@pafos.com
    healthCheckPath: /api/health
    autoDeploy: true

  # Client PWA
  - type: static
    name: pafos-client
    runtime: static
    buildCommand: cd packages/client && npm install && npm run build
    staticPublishPath: ./packages/client/dist
    headers:
      - path: /*
        name: Service-Worker-Allowed
        value: /
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pafos-backend
          type: web
          property: url
      - key: VITE_WS_URL
        fromService:
          name: pafos-backend
          type: web
          property: url
          value: ws://${url}

  # Admin Panel
  - type: static
    name: pafos-admin
    runtime: static
    buildCommand: cd packages/admin && npm install && npm run build
    staticPublishPath: ./packages/admin/dist
    headers:
      - path: /*
        name: X-Robots-Tag
        value: noindex
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pafos-backend
          type: web
          property: url
      - key: VITE_ADMIN_SECRET
        fromService:
          name: pafos-backend
          type: web
          property: env.ADMIN_SECRET_URL

databases:
  - name: pafos-db
    plan: free
    databaseName: pafos
    user: pafos

crons:
  - name: keep-alive
    schedule: "*/12 * * * *"
    command: curl -s https://pafos-backend.onrender.com/api/health